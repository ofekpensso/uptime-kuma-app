---
name: Build and Push Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::478468080341:role/uptime-kuma-dev-github-actions-ecr-role
  ECR_REPOSITORY: uptime-kuma

  IMAGE_TAG: sha-${{ github.sha }}
  DOCKERFILE_PATH: docker/Dockerfile
  DOCKER_BUILD_CONTEXT: .
  IMAGE_PLATFORM: linux/amd64

jobs:
  validate:
    name: Validate source, workflows, Helm, and Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      # -----------------------------
      # App dependency + lint checks
      # -----------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install application dependencies
        working-directory: app
        run: npm ci

      - name: Run application lint
        working-directory: app
        run: npm run lint:prod

      # -----------------------------
      # YAML validation
      # -----------------------------
      - name: Install yamllint
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint

      - name: Validate YAML syntax and style
        run: yamllint .github/workflows .yamllint.yml

      # -----------------------------
      # GitHub Actions workflow validation
      # -----------------------------
      - name: Validate GitHub Actions workflow syntax
        uses: reviewdog/action-actionlint@v1

      # -----------------------------
      # Helm chart validation
      # -----------------------------
      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.19.0

      - name: Validate Helm chart
        run: |
          helm lint helm/uptime-kuma \
            --strict \
            --values helm/uptime-kuma/values-dev.example.yaml \
            --set-string image.repository=example.invalid/uptime-kuma \
            --set-string image.tag=sha-ci-validation

          helm template uptime-kuma helm/uptime-kuma \
            --namespace uptime-kuma \
            --values helm/uptime-kuma/values-dev.example.yaml \
            --set-string image.repository=example.invalid/uptime-kuma \
            --set-string image.tag=sha-ci-validation \
            > /dev/null

      # -----------------------------
      # Dockerfile lint
      # -----------------------------
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          config: .hadolint.yaml


  build-scan-push:
    name: Build, scan, and push image
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      image-uri: ${{ steps.image-metadata.outputs.image_uri }}
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      # -----------------------------
      # AWS authentication with OIDC
      # -----------------------------
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------
      # Image metadata
      # -----------------------------
      - name: Create image metadata
        id: image-metadata
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

          echo "Image URI: ${IMAGE_URI}"
          echo "Image tag: ${IMAGE_TAG}"

      # -----------------------------
      # ECR immutable tag protection
      # -----------------------------
      - name: Check if image tag already exists in ECR
        id: image-check
        run: |
          if aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Image tag already exists in ECR: ${IMAGE_TAG}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Image tag does not exist yet: ${IMAGE_TAG}"
          fi

      - name: Skip build because image already exists
        if: steps.image-check.outputs.exists == 'true'
        run: |
          echo "Skipping build and push because immutable image tag already exists:"
          echo "${{ steps.image-metadata.outputs.image_uri }}"

      # -----------------------------
      # Docker build
      # -----------------------------
      - name: Set up Docker Buildx
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image locally
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.DOCKER_BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: ${{ env.IMAGE_PLATFORM }}
          tags: ${{ steps.image-metadata.outputs.image_uri }}
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------
      # Security scan before push
      # -----------------------------
      - name: Scan Docker image with Trivy
        if: steps.image-check.outputs.exists != 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.image-metadata.outputs.image_uri }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      # -----------------------------
      # Push only after validation + scan
      # -----------------------------
      - name: Push Docker image to ECR
        if: steps.image-check.outputs.exists != 'true'
        run: docker push "${{ steps.image-metadata.outputs.image_uri }}"

      - name: Print published image
        run: |
          echo "Image available at:"
          echo "${{ steps.image-metadata.outputs.image_uri }}"


  promote-to-dev:
    name: Promote image directly to dev
    runs-on: ubuntu-latest
    needs: build-scan-push

    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    env:
      PLATFORM_REPOSITORY: ofekpensso/uptime-kuma-platform
      PLATFORM_VALUES_FILE: gitops/values/uptime-kuma/dev.yaml
      IMAGE_TAG: ${{ needs.build-scan-push.outputs.image-tag }}

    steps:
      - name: Checkout platform repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.PLATFORM_REPOSITORY }}
          ref: main
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: platform
          fetch-depth: 0

      - name: Update dev image tag
        working-directory: platform
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          values_path = Path(os.environ["PLATFORM_VALUES_FILE"])
          image_tag = os.environ["IMAGE_TAG"]

          if not re.fullmatch(r"sha-[0-9a-f]{40}", image_tag):
              raise SystemExit(
                  f"Invalid immutable image tag: {image_tag}"
              )

          if not values_path.is_file():
              raise SystemExit(
                  f"Values file does not exist: {values_path}"
              )

          lines = values_path.read_text(
              encoding="utf-8"
          ).splitlines(keepends=True)

          image_block_found = False
          tag_updated = False
          image_indent = None

          for index, line in enumerate(lines):
              stripped = line.strip()

              if not image_block_found:
                  if stripped == "image:":
                      image_indent = len(line) - len(
                          line.lstrip(" ")
                      )

                      if image_indent != 0:
                          continue

                      image_block_found = True

                  continue

              if not stripped or stripped.startswith("#"):
                  continue

              current_indent = len(line) - len(
                  line.lstrip(" ")
              )

              if current_indent <= image_indent:
                  break

              if stripped.startswith("tag:"):
                  indentation = line[:current_indent]
                  line_ending = (
                      "\n" if line.endswith("\n") else ""
                  )

                  lines[index] = (
                      f"{indentation}tag: "
                      f"{image_tag}{line_ending}"
                  )

                  tag_updated = True
                  break

          if not image_block_found:
              raise SystemExit(
                  "Top-level image block was not found"
              )

          if not tag_updated:
              raise SystemExit(
                  "image.tag was not found inside image block"
              )

          values_path.write_text(
              "".join(lines),
              encoding="utf-8",
          )

          print(
              f"Updated {values_path} to {image_tag}"
          )
          PY

      - name: Validate promotion change
        working-directory: platform
        shell: bash
        run: |
          set -euo pipefail

          git diff --check
          git diff -- "${PLATFORM_VALUES_FILE}"

          UPDATED_TAG=$(
            awk '
              /^image:$/ {
                in_image = 1
                next
              }

              in_image && /^[^[:space:]]/ {
                in_image = 0
              }

              in_image && /^[[:space:]]+tag:/ {
                sub(
                  /^[[:space:]]+tag:[[:space:]]*/,
                  ""
                )
                print
                exit
              }
            ' "${PLATFORM_VALUES_FILE}"
          )

          if [[ "${UPDATED_TAG}" != "${IMAGE_TAG}" ]]; then
            echo "Expected tag: ${IMAGE_TAG}"
            echo "Actual tag:   ${UPDATED_TAG}"
            exit 1
          fi

      - name: Commit and push directly to main
        working-directory: platform
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "${PLATFORM_VALUES_FILE}"; then
            echo "Platform repository already uses ${IMAGE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${PLATFORM_VALUES_FILE}"

          git commit \
            -m "chore(dev): promote Uptime Kuma ${IMAGE_TAG}"

          # Do not force-push. If main changed while this job was
          # running, rebase the promotion commit on the latest main.
          git pull --rebase origin main

          git push origin HEAD:main

      - name: Print promotion result
        shell: bash
        run: |
          echo "Promoted Uptime Kuma to dev:"
          echo "${IMAGE_TAG}"
          echo
          echo "Platform repository:"
          echo "${PLATFORM_REPOSITORY}"
